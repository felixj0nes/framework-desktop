<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Framework</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 400px;
      height: 300px;
      overflow: hidden;
      background: #F9FAFB;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: 400px;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: #F9FAFB;
      /* No drag — splash is purely visual */
      -webkit-app-region: no-drag;
    }

    /* Logomark — three horizontal bars on blue-tint rounded square */
    .logomark {
      width: 80px;
      height: 80px;
      background: #DBEAFE;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 22px 19px;
      gap: 10px;
      flex-shrink: 0;
      margin-bottom: 20px;
    }
    .bar { border-radius: 3px; }
    .b1 { width: 100%; height: 6px; background: #111827; }
    .b2 { width: 60%;  height: 6px; background: #3B82F6; }
    .b3 { width: 78%;  height: 6px; background: #E5E7EB; }

    .wordmark {
      font-size: 22px;
      font-weight: 500;
      color: #111827;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 13px;
      font-weight: 400;
      color: #9CA3AF;
      margin-bottom: 32px;
    }

    /* Three-dot pulse loader */
    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1D4ED8;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.30s; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.75); }
    }

    /* Fade in the whole shell */
    .shell {
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="logomark">
      <div class="bar b1"></div>
      <div class="bar b2"></div>
      <div class="bar b3"></div>
    </div>
    <div class="wordmark">Framework</div>
    <div class="tagline">The system behind the trade.</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
