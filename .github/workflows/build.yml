name: Build installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install sharp for asset generation
        run: npm install --no-save sharp

      - name: Generate build assets (DMG background, icon.icns)
        run: npm run generate-assets

      - name: Build Mac DMG (x64 + arm64)
        run: electron-builder --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Framework-*.dmg
            dist/latest-mac.yml
          draft: false
          prerelease: false

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build Windows NSIS installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Framework Setup *.exe
            dist/latest.yml
          draft: false
          prerelease: false
