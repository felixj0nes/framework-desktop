name: Build installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build Mac DMG (x64 + arm64)
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Tell electron-builder not to publish — we upload manually below
          EP_DRAFT: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Framework-*.dmg
          draft: false
          prerelease: false

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FrameworkSetup.exe
          draft: false
          prerelease: false
