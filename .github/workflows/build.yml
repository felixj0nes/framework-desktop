name: Build installers

# Triggered by version tags (v1.0.0, v1.2.3, etc.) or manually via the
# GitHub Actions UI. Both platforms build in parallel.
#
# CODE SIGNING — to activate:
#   Windows: add WIN_CERT_PATH and WIN_CERT_PASSWORD to repository secrets.
#   macOS:   add APPLE_IDENTITY, APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID
#            to repository secrets. Notarisation runs automatically via
#            build/notarize.js once credentials are present.
#   See: Settings -> Secrets -> Actions -> New repository secret

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Verify required build assets
        run: |
          for f in build/icon-source.svg build/splash.html build/update.html build/dmg-background.svg; do
            if [ ! -f "$f" ]; then echo "Missing required asset: $f" && exit 1; fi
          done
          echo "All required assets present"

      - name: Build Mac DMG (generates assets + packages)
        # Artifact produced: Framework-{version}.dmg (set by artifactName in package.json)
        # To activate code signing and notarisation, add APPLE_IDENTITY, APPLE_ID,
        # APPLE_ID_PASSWORD, and APPLE_TEAM_ID to repository secrets.
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Mac release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Framework-*.dmg
            dist/latest-mac.yml
          draft: false
          prerelease: false

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Verify required build assets
        shell: bash
        run: |
          for f in build/icon-source.svg build/splash.html build/update.html; do
            if [ ! -f "$f" ]; then echo "Missing required asset: $f" && exit 1; fi
          done
          echo "All required assets present"

      - name: Build Windows NSIS installer
        # Artifact produced: Framework-{version}.exe (set by artifactName in package.json)
        # Signing is skipped automatically when WIN_CERT_PATH is not set.
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows build output
        shell: bash
        run: |
          if ls dist/Framework-*.exe 1>/dev/null 2>&1; then
            echo "Windows installer produced successfully:"
            ls -lh dist/Framework-*.exe
          else
            echo "ERROR: No Framework-*.exe found in dist/" && exit 1
          fi

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Framework-*.exe
            dist/latest.yml
          draft: false
          prerelease: false
